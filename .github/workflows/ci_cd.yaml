name: CI-CD

on: push

jobs:
  CI-CD:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout Code
      # -------------------------
      - name: Code Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Setup Python
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          cache: 'pip'

      # -------------------------
      # Install Dependencies
      # -------------------------
      - name: Install Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ github.workspace }}/requirements-dev.txt

      # -------------------------
      # Configure AWS Credentials
      # -------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      # -------------------------
      # DVC Pull
      # -------------------------
      - name: DVC Pull
        run: |
          dvc pull

      # -------------------------
      # Run Tests
      # -------------------------
      - name: Test Model Registry
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
         pytest

      - name: Test Model Performance
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          pytest tests/test_model_performance.py

      # -------------------------
      # Promote Model
      # -------------------------
      - name: Promote Model
        if: success()
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python promote_model.py

      # -------------------------
      # Login to Amazon ECR
      # -------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------
      # Build and Push Docker Image
      # -------------------------
      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.AWS_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          export REGISTRY=$REGISTRY
          export REPOSITORY=$REPOSITORY
          export IMAGE_TAG=$IMAGE_TAG

          echo "Registry: $REGISTRY"
          echo "Repository: $REPOSITORY"

          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      # -------------------------
      # Zip Deployment Files
      # -------------------------
      - name: Zip files for deployment
        if: success()
        run: |
          zip -r deployment.zip appspec.yml deploy/scripts/install_dependencies.sh deploy/scripts/start_docker.sh

      # -------------------------
      # Upload ZIP to S3
      # -------------------------
      - name: Upload ZIP to S3
        if: success()
        run: |
          aws s3 cp deployment.zip s3://demandpredictiondeployment/deployment.zip

      # -------------------------
      # Deploy to AWS CodeDeploy
      # -------------------------
      - name: Deploy to AWS CodeDeploy
        if: success()
        run: |
          aws deploy create-deployment \
            --application-name uber-demand-prediction \
            --deployment-config-name CodeDeployDefault.OneAtATime \
            --deployment-group-name uber-demand-prediction-deployment-group \
            --s3-location bucket=demandpredictiondeployment,key=deployment.zip,bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --region eu-north-1